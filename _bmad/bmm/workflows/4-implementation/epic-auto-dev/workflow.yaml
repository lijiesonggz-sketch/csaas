name: epic-auto-dev
description: "自动化执行整个 EPIC 的开发流程，包括故事创建、验证、开发、测试和代码审查。质量优先 - 不因为token限制而简化"
author: "BMad"

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated
sprint_artifacts: "{config_source}:sprint_artifacts"

# Workflow components
installed_path: "{project-root}/_bmad/bmm/workflows/4-implementation/epic-auto-dev"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
template: false

# Variables
variables:
  sprint_status: "{sprint_artifacts}/sprint-status.yaml"
  story_dir: "{sprint_artifacts}"
  max_retries: 10  # 增加重试次数
  auto_fix_issues: true
  quality_first: true  # 质量优先标志
  project_context: "**/project-context.md"

# Output configuration
default_output_file: "{output_folder}/epic-auto-dev-report-{{date}}.md"

# Required tools
required_tools:
  - read_file
  - write_file
  - invoke_task  # 用于创建独立subagent，每个步骤在干净上下文中执行，支持自动修复循环
  - bash

# Workflow paths for invocation
workflow_paths:
  create_story: "{project-root}/_bmad/bmm/workflows/4-implementation/create-story/workflow.yaml"
  validate_story: "{project-root}/_bmad/bmm/workflows/4-implementation/create-story/validate-story-workflow.yaml"
  dev_story: "{project-root}/_bmad/bmm/workflows/4-implementation/dev-story/workflow.yaml"
  code_review: "{project-root}/_bmad/bmm/workflows/4-implementation/code-review/workflow.yaml"
  testarch_automate: "{project-root}/_bmad/bmm/workflows/testarch/automate/workflow.yaml"

standalone: true

# Prompt-based permissions for automation
# 预授权常见开发命令，避免中断自动化流程
allowedPrompts:
  - tool: Bash
    prompt: "install dependencies"
  - tool: Bash
    prompt: "run tests"
  - tool: Bash
    prompt: "run migrations"
  - tool: Bash
    prompt: "run database migrations"
  - tool: Bash
    prompt: "create database tables"
  - tool: Bash
    prompt: "build project"
  - tool: Bash
    prompt: "compile code"
  - tool: Bash
    prompt: "run linter"
  - tool: Bash
    prompt: "format code"
  - tool: Bash
    prompt: "check git status"
  - tool: Bash
    prompt: "view git diff"
  - tool: Bash
    prompt: "stage changes"
  - tool: Bash
    prompt: "run npm scripts"
  - tool: Bash
    prompt: "run yarn scripts"
  - tool: Bash
    prompt: "execute typeorm commands"
  - tool: Bash
    prompt: "execute prisma commands"
  - tool: Bash
    prompt: "run playwright tests"
  - tool: Bash
    prompt: "run jest tests"
  - tool: Bash
    prompt: "run vitest tests"
  - tool: Bash
    prompt: "run e2e tests"
  - tool: Bash
    prompt: "run unit tests"
  - tool: Bash
    prompt: "run integration tests"
