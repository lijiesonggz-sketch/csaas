name: validate-story
description: "Validate story quality using SM agent"
author: "BMad"

config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
document_output_language: "{config_source}:document_output_language"
date: system-generated
sprint_artifacts: "{config_source}:sprint_artifacts"

installed_path: "{project-root}/_bmad/bmm/workflows/4-implementation/create-story"
instructions: "{installed_path}/validate-instructions.xml"
validation: "{installed_path}/validate-checklist.md"
template: false

variables:
  sprint_status: "{sprint_artifacts}/sprint-status.yaml"
  story_dir: "{sprint_artifacts}"
  project_context: "**/project-context.md"

default_output_file: "{story_dir}/{{story_key}}-validation-report.md"

standalone: true
