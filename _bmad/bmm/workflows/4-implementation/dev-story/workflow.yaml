name: dev-story
description: "Execute a story by implementing tasks/subtasks, writing tests, validating, and updating the story file per acceptance criteria"
author: "BMad"

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
story_dir: "{config_source}:sprint_artifacts"
date: system-generated

# Workflow components
installed_path: "{project-root}/_bmad/bmm/workflows/4-implementation/dev-story"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

story_file: "" # Explicit story path; auto-discovered if empty
sprint_artifacts: "{config_source}:sprint_artifacts"
sprint_status: "{sprint_artifacts}/sprint-status.yaml"
project_context: "**/project-context.md"

standalone: true

# Prompt-based permissions for automation
# 预授权常见开发命令，避免中断自动化流程
allowedPrompts:
  - tool: Bash
    prompt: "install dependencies"
  - tool: Bash
    prompt: "run tests"
  - tool: Bash
    prompt: "run migrations"
  - tool: Bash
    prompt: "run database migrations"
  - tool: Bash
    prompt: "create database tables"
  - tool: Bash
    prompt: "build project"
  - tool: Bash
    prompt: "compile code"
  - tool: Bash
    prompt: "run linter"
  - tool: Bash
    prompt: "format code"
  - tool: Bash
    prompt: "check git status"
  - tool: Bash
    prompt: "view git diff"
  - tool: Bash
    prompt: "stage changes"
  - tool: Bash
    prompt: "run npm scripts"
  - tool: Bash
    prompt: "run yarn scripts"
  - tool: Bash
    prompt: "execute typeorm commands"
  - tool: Bash
    prompt: "execute prisma commands"
  - tool: Bash
    prompt: "run playwright tests"
  - tool: Bash
    prompt: "run jest tests"
  - tool: Bash
    prompt: "run vitest tests"
  - tool: Bash
    prompt: "run e2e tests"
  - tool: Bash
    prompt: "run unit tests"
  - tool: Bash
    prompt: "run integration tests"
